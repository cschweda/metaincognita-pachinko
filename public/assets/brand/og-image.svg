<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="40%" stop-color="#0a0d17"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="30%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lcdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000d1a"/>
      <stop offset="100%" stop-color="#001122"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#00ffcc"/>
      <stop offset="70%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </linearGradient>
    <filter id="segGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pinGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.02">
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#fff" stroke-width="0.5"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#g)"/>
  </g>

  <!-- Board outline -->
  <rect x="370" y="170" width="460" height="420" rx="8" fill="#111318" stroke="#1e2530" stroke-width="2"/>

  <!-- LCD Display -->
  <rect x="440" y="260" width="320" height="120" rx="4" fill="url(#lcdBg)" stroke="#00aaff" stroke-width="1.5" opacity="0.8"/>
  <rect x="444" y="264" width="312" height="112" rx="2" fill="none" stroke="#004488" stroke-width="0.5" opacity="0.4"/>

  <!-- 7-segment "7 7 7" display — centered in LCD panel -->
  <!-- Each digit ~50px wide, 70px tall. 3 digits spaced 90px apart = 230px total. Centered at x=600: start at 485 -->
  <g filter="url(#segGlow)">
    <!-- Digit 7 (left) -->
    <g transform="translate(485, 278)">
      <polygon points="6,0 44,0 40,5 10,5" fill="#ffd700"/>
      <polygon points="42,2 48,8 48,34 42,40 36,34 36,8" fill="#ffd700"/>
      <polygon points="42,38 48,44 48,70 42,76 36,70 36,44" fill="#ffd700"/>
      <polygon points="6,36 44,36 40,41 10,41" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="6,72 44,72 40,77 10,77" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="0,2 6,8 6,34 0,40 -6,34 -6,8" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="0,38 6,44 6,70 0,76 -6,70 -6,44" fill="#0a1a2a" opacity="0.25"/>
    </g>
    <!-- Digit 7 (center) -->
    <g transform="translate(575, 278)">
      <polygon points="6,0 44,0 40,5 10,5" fill="#ffd700"/>
      <polygon points="42,2 48,8 48,34 42,40 36,34 36,8" fill="#ffd700"/>
      <polygon points="42,38 48,44 48,70 42,76 36,70 36,44" fill="#ffd700"/>
      <polygon points="6,36 44,36 40,41 10,41" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="6,72 44,72 40,77 10,77" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="0,2 6,8 6,34 0,40 -6,34 -6,8" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="0,38 6,44 6,70 0,76 -6,70 -6,44" fill="#0a1a2a" opacity="0.25"/>
    </g>
    <!-- Digit 7 (right) -->
    <g transform="translate(665, 278)">
      <polygon points="6,0 44,0 40,5 10,5" fill="#ffd700"/>
      <polygon points="42,2 48,8 48,34 42,40 36,34 36,8" fill="#ffd700"/>
      <polygon points="42,38 48,44 48,70 42,76 36,70 36,44" fill="#ffd700"/>
      <polygon points="6,36 44,36 40,41 10,41" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="6,72 44,72 40,77 10,77" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="0,2 6,8 6,34 0,40 -6,34 -6,8" fill="#0a1a2a" opacity="0.25"/>
      <polygon points="0,38 6,44 6,70 0,76 -6,70 -6,44" fill="#0a1a2a" opacity="0.25"/>
    </g>
  </g>

  <!-- "JACKPOT!" text under LCD -->
  <text x="600" y="392" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="14" font-weight="700" fill="#ffd700" letter-spacing="4" opacity="0.9">
    JACKPOT!
  </text>

  <!-- Pin field (decorative dots) -->
  <g filter="url(#pinGlow)">
    <!-- Upper pins -->
    <g fill="#C9A94E" opacity="0.7">
      <circle cx="410" cy="200" r="2.5"/><circle cx="430" cy="200" r="2.5"/><circle cx="450" cy="200" r="2.5"/><circle cx="470" cy="200" r="2.5"/><circle cx="490" cy="200" r="2.5"/>
      <circle cx="710" cy="200" r="2.5"/><circle cx="730" cy="200" r="2.5"/><circle cx="750" cy="200" r="2.5"/><circle cx="770" cy="200" r="2.5"/><circle cx="790" cy="200" r="2.5"/>
      <circle cx="420" cy="218" r="2.5"/><circle cx="440" cy="218" r="2.5"/><circle cx="460" cy="218" r="2.5"/><circle cx="480" cy="218" r="2.5"/>
      <circle cx="720" cy="218" r="2.5"/><circle cx="740" cy="218" r="2.5"/><circle cx="760" cy="218" r="2.5"/><circle cx="780" cy="218" r="2.5"/>
      <circle cx="410" cy="236" r="2.5"/><circle cx="430" cy="236" r="2.5"/><circle cx="450" cy="236" r="2.5"/><circle cx="470" cy="236" r="2.5"/><circle cx="490" cy="236" r="2.5"/>
      <circle cx="710" cy="236" r="2.5"/><circle cx="730" cy="236" r="2.5"/><circle cx="750" cy="236" r="2.5"/><circle cx="770" cy="236" r="2.5"/><circle cx="790" cy="236" r="2.5"/>
    </g>
    <!-- Lower pins -->
    <g fill="#C9A94E" opacity="0.6">
      <circle cx="420" cy="430" r="2.5"/><circle cx="445" cy="430" r="2.5"/><circle cx="470" cy="430" r="2.5"/><circle cx="495" cy="430" r="2.5"/><circle cx="520" cy="430" r="2.5"/>
      <circle cx="545" cy="430" r="2.5"/><circle cx="570" cy="430" r="2.5"/><circle cx="595" cy="430" r="2.5"/><circle cx="620" cy="430" r="2.5"/><circle cx="645" cy="430" r="2.5"/>
      <circle cx="670" cy="430" r="2.5"/><circle cx="695" cy="430" r="2.5"/><circle cx="720" cy="430" r="2.5"/><circle cx="745" cy="430" r="2.5"/><circle cx="770" cy="430" r="2.5"/>
      <circle cx="432" cy="448" r="2.5"/><circle cx="457" cy="448" r="2.5"/><circle cx="482" cy="448" r="2.5"/><circle cx="507" cy="448" r="2.5"/><circle cx="532" cy="448" r="2.5"/>
      <circle cx="557" cy="448" r="2.5"/><circle cx="582" cy="448" r="2.5"/><circle cx="607" cy="448" r="2.5"/><circle cx="632" cy="448" r="2.5"/><circle cx="657" cy="448" r="2.5"/>
      <circle cx="682" cy="448" r="2.5"/><circle cx="707" cy="448" r="2.5"/><circle cx="732" cy="448" r="2.5"/><circle cx="757" cy="448" r="2.5"/>
      <circle cx="420" cy="466" r="2.5"/><circle cx="445" cy="466" r="2.5"/><circle cx="470" cy="466" r="2.5"/><circle cx="495" cy="466" r="2.5"/><circle cx="520" cy="466" r="2.5"/>
      <circle cx="545" cy="466" r="2.5"/><circle cx="570" cy="466" r="2.5"/><circle cx="595" cy="466" r="2.5"/><circle cx="620" cy="466" r="2.5"/><circle cx="645" cy="466" r="2.5"/>
      <circle cx="670" cy="466" r="2.5"/><circle cx="695" cy="466" r="2.5"/><circle cx="720" cy="466" r="2.5"/><circle cx="745" cy="466" r="2.5"/><circle cx="770" cy="466" r="2.5"/>
    </g>
  </g>

  <!-- Steel balls (decorative) -->
  <g>
    <circle cx="505" cy="450" r="5" fill="#C0C0C0" opacity="0.9"/>
    <circle cx="503" cy="448" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="628" cy="440" r="5" fill="#C0C0C0" opacity="0.9"/>
    <circle cx="626" cy="438" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="560" cy="460" r="5" fill="#C0C0C0" opacity="0.8"/>
    <circle cx="558" cy="458" r="2" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="690" cy="455" r="5" fill="#C0C0C0" opacity="0.85"/>
    <circle cx="688" cy="453" r="2" fill="#FFFFFF" opacity="0.45"/>
  </g>

  <!-- Chakker gate -->
  <rect x="570" y="415" width="60" height="8" rx="2" fill="#4ecdc4" opacity="0.4" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="85" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="#fafafa" letter-spacing="-1">
    PachinkoParlor
  </text>

  <!-- Accent line -->
  <rect x="370" y="102" width="460" height="3" rx="1.5" fill="url(#accentLine)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="600" y="138" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#a1a1aa" letter-spacing="4">
    THE PINS ARE PHYSICS. THE PAYOFF IS PREDETERMINED.
  </text>

  <!-- Suite label -->
  <text x="600" y="580" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#fafafa" opacity="0.3" letter-spacing="2">
    METAINCOGNITA CASINO SIMULATOR SUITE
  </text>

  <!-- URL -->
  <text x="600" y="605" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#fafafa" opacity="0.2">
    pachinko.metaincognita.com
  </text>
</svg>
